# config.yaml

# =============================================================================
# API認証情報
# =============================================================================
api_credentials:
  jquants:
    mail_address_env_var: "JQUANTS_MAIL"
    password_env_var: "JQUANTS_PASSWORD"
  slack:
    webhook_url_env_var: "SLACK_WEBHOOK_URL"

# =============================================================================
# バックテスト・学習・予測の対象銘柄
# このリストが銘柄情報の唯一の設定元です。
# =============================================================================
stocks:
  - code: "1570"
    name: "日経レバ"
    notify_slack: false
  - code: "7211"
    name: "三菱自動車"
    notify_slack: true
  - code: "4689"
    name: "LINEヤフー"
    notify_slack: false
  - code: "8306"
    name: "三菱UFJ"
    notify_slack: true
  - code: "5020"
    name: "ENEOS"
    notify_slack: false
  - code: "9432"
    name: "NTT"
    notify_slack: false
  - code: "4188"
    name: "三菱ケミカルグループ"
    notify_slack: false
  - code: "7267"
    name: "本田技研工業"
    notify_slack: false

# =============================================================================
# 全銘柄の共通売買条件
# バックテストでPASSまたはREVIEWになった銘柄別ルールは result_path から自動適用されます。
# =============================================================================
ai_params:
  budget: 300000
  future_days: 2
  target_percent: 1.0
  threshold: 0.15
  stop_loss_percent: 5.0
  commission_percent: 0.0
  entry_slippage_percent: 0.03
  exit_slippage_percent: 0.03
  stop_slippage_percent: 0.10

# AIモデルに使用する特徴量
feature_columns:
  - "SMA_5_Rate"
  - "SMA_25_Rate"
  - "RSI_14"
  - "MACD_Rate"
  - "BB_Position"
  - "ATR_Rate"
  - "ADX_14"
  - "Change_Rate_1"
  - "Change_Rate_3"
  - "Change_Rate_5"
  - "Volume_Change_1"

# =============================================================================
# テクニカル指標
# =============================================================================
technical_analysis_params:
  sma: {short_period: 5, long_period: 25}
  rsi: {period: 14}
  macd: {fast_period: 12, slow_period: 26, signal_period: 9}

# =============================================================================
# 学習設定
# モデルは models/stock_ai_model_<code>.pkl へ自動保存されます。
# =============================================================================
training_settings:
  data_from: "2020-01-01"
  data_to: "auto"

# =============================================================================
# バックテスト設定
# 合格銘柄のうち研究スコアが最高の銘柄を推奨として出力します。
# Slack通知対象は stocks[].notify_slack で手動設定します。
# =============================================================================
backtest_settings:
  research_from: "2020-01-01"
  research_to: "2025-03-31"
  final_from: "2025-04-01"
  final_to: "2026-05-20"
  budget: 300000
  min_research_trades: 10
  min_final_trades: 30
  max_drawdown_percent: 15.0
  min_month_win_rate: 50.0
  max_single_month_profit_share: 70.0
  result_path: "data/backtest_selection.yaml"
